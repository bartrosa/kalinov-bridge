name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync
        run: uv sync --frozen --group dev --python ${{ matrix.python-version }}

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      - name: Pytest
        run: uv run pytest

  python-mcp:
    name: python (MCP extra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync (with MCP SDK)
        run: uv sync --frozen --group dev --extra mcp --python 3.12

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      - name: Pytest
        run: uv run pytest

  lean-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
          use-mathlib-cache: auto

  lean-prover:
    name: lean integration
    runs-on: ubuntu-latest
    needs: python
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf -o elan-init.sh
          bash elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync
        run: uv sync --frozen --group dev --python 3.12

      - name: Cache Lake build (prover runtime)
        uses: actions/cache@v4
        with:
          path: provers/lean/runtime/.lake
          key: lake-${{ runner.os }}-${{ hashFiles('provers/lean/runtime/lake-manifest.json', 'provers/lean/runtime/lean-toolchain') }}

      - name: Build runtime project
        working-directory: provers/lean/runtime
        run: lake build

      - name: Run Lean integration tests
        run: uv run pytest -m lean
